name: Yle-uutisseuranta

on:
  schedule:
    # Joka tunti (UTC-aikaa, Suomi = UTC+3 kesällä / UTC+2 talvella)
    - cron: '0 * * * *'
  # Mahdollistaa myös manuaalisen käynnistyksen GitHubista
  workflow_dispatch:

jobs:
  skrappaa:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Hae koodi
        uses: actions/checkout@v4

      - name: Asenna Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Asenna riippuvuudet
        run: pip install -r requirements.txt

      - name: Aja skrapperi
        env:
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
          YLE_APP_ID:                  ${{ secrets.YLE_APP_ID }}
          YLE_APP_KEY:                 ${{ secrets.YLE_APP_KEY }}
          GOOGLE_SHEET_ID:             ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON:     ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python scraper.py
